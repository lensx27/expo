<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter Pro</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* CONTENEDOR PRINCIPAL */
  #pantalla {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    text-align: center;
    padding: 20px;
  }

  /* TEXTO */
  #texto {
    width: 100%;
    max-width: 900px;
  }

  .linea {
    opacity: 0.3;
    font-size: clamp(20px, 4vw, 40px);
    margin: 10px 0;
    transition: all 0.3s ease;
  }

  .activa {
    opacity: 1;
    color: lime;
    font-size: clamp(28px, 6vw, 60px);
    font-weight: bold;
  }

  /* CONTROLES ABAJO */
  #controles {
    background: #111;
    padding: 10px;
    text-align: center;
  }

  button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  input {
    width: 80px;
    text-align: center;
    font-size: 16px;
  }
</style>

</head>
<body>

<div id="pantalla">
  <div id="texto"></div>
</div>

<div id="controles">
  <button onclick="iniciar()">▶ Iniciar</button>
  <button onclick="pausar()">⏸ Pausar</button>
  <button onclick="reiniciar()">🔄 Reiniciar</button>
  Velocidad(ms): <input type="number" id="velocidad" value="800">
</div>

<script>

const texto = `
El modelado de
 negocio se
  enfoca en
   entender cómo
    funciona actualmente
     el proceso de
      entrega de
       raciones
        y cómo
         interactúan
          las entidades
           externas con
            el restaurante.

Modelado del 
Proceso de negocio            

Este diagrama
representa el
modelo de negocio
mediante casos
de uso.

El sistema
está diseñado
para gestionar
el servicio
de alimentación
en una institución.

Se muestra
cómo los actores
interactúan con
el sistema
y cómo sus
acciones contribuyen
a un objetivo
común.

Este objetivo
es la generación
de reportes.

En primer lugar,
se identifican
cuatro actores
principales.

El oficial,
el recepcionista,
el encargado
de cocina
y el administrador.

Cada uno
cumple un rol
específico dentro
del proceso.

El oficial
registra su
reserva en
el padrón.

También puede
visualizar su
ticket para

El recepcionista
valida el
código QR
del ticket.

Esto asegura
que solo personas
autorizadas
reciban atención.

Por otro lado,
el encargado
de cocina
gestiona el
menú del día.

También controla
la entrega
de raciones.

Estas acciones
garantizan un
servicio eficiente
y organizado.

Mientras tanto,
el administrador
cumple un rol
más estratégico.

Se encarga
de conciliar
la facturación.

Gestiona reportes
de asistencia
y actualiza
el listado
de oficiales.

Un aspecto clave
del diagrama
es la relación
de inclusión.

Esto significa
que todos
los procesos
están conectados.

Cada acción
realizada en
el sistema
genera información.

Desde el registro
hasta la entrega
de raciones.

Toda esta información
se consolida
en un reporte final.

En conjunto,
el sistema integra
procesos operativos
y administrativos.

Su objetivo
es optimizar
la gestión
del servicio.

También mejorar
el control
y facilitar
la toma
de decisiones.

Finalmente,
se obtiene información
centralizada
y confiable.

por otro lado
 esta el
 Modelado de 
 Análisis del 
 negocio

Este diagrama
corresponde a
un diagrama
de robustez.

Está enfocado
en el proceso
de validación
de un código QR.

Su objetivo
es mostrar
cómo interactúan
la interfaz,
la lógica
del sistema
y las entidades
de datos.

El flujo inicia
en la pantalla
de escaneo
de la aplicación.

Esta pantalla
representa la interfaz
con la que
el usuario
interactúa.

En el paso uno,
el usuario escanea
el código QR.

La aplicación
envía estos datos

Este gestor
actúa como
el componente central

se realizan

el sistema consulta
los datos

Verifica su vigencia

que el código

en el paso tres,

comparando con

en el paso cuatro,

queda evidencia

el sistema devuelve

Este resultado
se muestra

Indicando si
la validación
fue aprobada
o rechazada.

En conjunto,
este diagrama
permite entender
todo el proceso.

Desde el escaneo

hasta el resultado final.

Asegurando control,
validación de acceso
y registro
de información.`;

let lineas = texto.split("\n").filter(l => l.trim() !== "");
let index = 0;
let intervalo = null;

function iniciar() {
  if (intervalo) return;
  mostrar();
}

function pausar() {
  clearTimeout(intervalo);
  intervalo = null;
}

function reiniciar() {
  pausar();
  index = 0;
  document.getElementById("texto").innerHTML = "";
}

function mostrar() {
  if (index >= lineas.length) return;

  let contenedor = document.getElementById("texto");

  // mantener máximo 5 líneas visibles
  if (contenedor.children.length >= 5) {
    contenedor.removeChild(contenedor.firstChild);
  }

  let div = document.createElement("div");
  div.className = "linea";
  div.innerText = lineas[index];

  contenedor.appendChild(div);

  // quitar activa anterior
  let todas = document.querySelectorAll(".linea");
  todas.forEach(el => el.classList.remove("activa"));

  // activar última (centro visual)
  div.classList.add("activa");

  index++;

  let vel = document.getElementById("velocidad").value;
  intervalo = setTimeout(mostrar, vel);
}

</script>

</body>
</html>
